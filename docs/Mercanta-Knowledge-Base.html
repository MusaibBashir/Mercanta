<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercanta — Developer Knowledge Base</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#161b27;--bg3:#1e2536;--bg4:#252d3d;
  --border:#2a3348;--border2:#344060;
  --text:#cdd9f0;--text2:#8899bb;--text3:#5a6a88;
  --gold:#c8a84b;--gold2:#9a7023;--gold3:#e6c96a;
  --navy:#3b5bdb;--navy2:#2d4abf;--navy3:#6585f0;
  --green:#2ea043;--green2:#3fb950;
  --red:#f85149;--red2:#ff7b72;
  --purple:#bc8cff;--teal:#79c0ff;--orange:#ffa657;
  --mono:'Consolas','JetBrains Mono','Cascadia Code',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --radius:6px;--radius2:10px;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;overflow:hidden;height:100vh}

/* ── Layout ── */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:260px;min-width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#main{flex:1;overflow:hidden;display:flex;flex-direction:column}
#topbar{height:48px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
#content{flex:1;overflow-y:auto;padding:32px 40px;max-width:1100px}

/* ── Sidebar ── */
.sidebar-header{padding:16px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-logo{font-size:15px;font-weight:700;color:var(--gold);letter-spacing:.5px}
.sidebar-subtitle{font-size:11px;color:var(--text3);margin-top:2px}
.sidebar-search{padding:10px 12px;flex-shrink:0}
.sidebar-search input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;color:var(--text);font-size:12px;font-family:var(--sans);outline:none}
.sidebar-search input::placeholder{color:var(--text3)}
.sidebar-search input:focus{border-color:var(--border2)}
.sidebar-nav{flex:1;overflow-y:auto;padding:4px 8px 16px}
.nav-section{margin-bottom:4px}
.nav-section-header{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:8px 8px 4px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
.nav-section-header:hover{color:var(--text2)}
.nav-arrow{transition:transform .15s;font-size:9px}
.nav-arrow.open{transform:rotate(90deg)}
.nav-items{overflow:hidden}
.nav-item{padding:5px 8px 5px 14px;border-radius:var(--radius);cursor:pointer;font-size:12.5px;color:var(--text2);display:flex;align-items:center;gap:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--bg4);color:var(--gold);font-weight:600}
.nav-item .nav-badge{margin-left:auto;font-size:10px;background:var(--bg4);color:var(--text3);border-radius:10px;padding:1px 6px;flex-shrink:0}
.nav-item .nav-icon{font-size:11px;flex-shrink:0;width:14px;text-align:center}

/* ── Topbar ── */
.topbar-title{font-size:14px;color:var(--text);font-weight:500}
.topbar-breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text3)}
.topbar-breadcrumb span{color:var(--text2)}
.topbar-breadcrumb .sep{color:var(--text3)}
.search-trigger{margin-left:auto;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:5px 12px;color:var(--text3);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:var(--sans)}
.search-trigger:hover{border-color:var(--border2);color:var(--text2)}
.search-trigger kbd{background:var(--bg4);border:1px solid var(--border2);border-radius:3px;padding:1px 5px;font-size:10px;font-family:var(--mono)}

/* ── Content ── */
.page-header{margin-bottom:28px}
.page-title{font-size:24px;font-weight:700;color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:10px}
.page-title .page-icon{font-size:20px}
.page-desc{color:var(--text2);font-size:14px;line-height:1.6;max-width:720px}

h2{font-size:16px;font-weight:700;color:var(--text);margin:28px 0 12px;display:flex;align-items:center;gap:8px}
h2::before{content:'';display:block;width:3px;height:16px;background:var(--gold);border-radius:2px;flex-shrink:0}
h3{font-size:13px;font-weight:700;color:var(--text2);margin:16px 0 8px;text-transform:uppercase;letter-spacing:.6px}

/* ── Cards & Tables ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:16px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:8px}

.data-table{width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:16px}
.data-table th{text-align:left;padding:8px 12px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--border);background:var(--bg3)}
.data-table td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:top}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:var(--bg3)}
.data-table .mono{font-family:var(--mono);font-size:12px;color:var(--teal)}

/* ── Tags / Badges ── */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:opacity .15s}
.tag:hover{opacity:.8}
.tag-component{background:#1e3a5f;color:#79c0ff;border:1px solid #2d5a8e}
.tag-table{background:#1a3320;color:#56d364;border:1px solid #2d5a45}
.tag-context{background:#2d1a4a;color:#bc8cff;border:1px solid #4a2d7a}
.tag-service{background:#3a2200;color:#ffa657;border:1px solid #5a3a00}
.tag-route{background:#1a2a3a;color:#79c0ff;border:1px solid #2a4a6a}
.tag-admin{background:#3a0a0a;color:#ff7b72;border:1px solid #5a1a1a}
.tag-franchise{background:#0a2a1a;color:#3fb950;border:1px solid #1a4a2a}
.tag-public{background:#2a2a0a;color:#e3b341;border:1px solid #4a4a1a}
.tag-optional{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}

/* ── State variable entries ── */
.state-item{padding:8px 12px;border-left:2px solid var(--border2);margin-bottom:6px;background:var(--bg3);border-radius:0 var(--radius) var(--radius) 0}
.state-name{font-family:var(--mono);font-size:12.5px;color:var(--gold3)}
.state-type{font-family:var(--mono);font-size:11.5px;color:var(--purple)}
.state-default{font-size:11px;color:var(--text3)}
.state-desc{font-size:12px;color:var(--text2);margin-top:2px}

/* ── Function entries ── */
.fn-item{padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;background:var(--bg2)}
.fn-item:hover{border-color:var(--border2)}
.fn-sig{font-family:var(--mono);font-size:12px;color:var(--text);line-height:1.5}
.fn-name{color:var(--navy3)}
.fn-param{color:var(--orange)}
.fn-type{color:var(--purple)}
.fn-return{color:var(--green2)}
.fn-desc{font-size:12px;color:var(--text2);margin-top:5px;line-height:1.5}
.fn-tags{margin-top:6px;display:flex;flex-wrap:wrap;gap:4px}

/* ── DB Schema ── */
.table-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);margin-bottom:16px;overflow:hidden}
.table-card-header{padding:12px 16px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.table-card-header:hover{background:var(--bg4)}
.table-name{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--gold)}
.table-meta{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:8px}
.table-rls{background:#1a2a1a;color:#3fb950;border:1px solid #2a4a2a;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700}
.col-row{display:grid;grid-template-columns:180px 130px 1fr;gap:8px;padding:6px 16px;border-bottom:1px solid var(--border);align-items:start;font-size:12px}
.col-row:last-child{border-bottom:none}
.col-row:hover{background:var(--bg3)}
.col-name{font-family:var(--mono);color:var(--teal)}
.col-name.pk{color:var(--gold)}
.col-name.fk{color:var(--purple)}
.col-type{font-family:var(--mono);color:var(--orange);font-size:11px}
.col-notes{color:var(--text2);font-size:11.5px}
.col-pk-badge{display:inline-block;background:#2d2000;border:1px solid #5a4000;color:#c8a84b;border-radius:3px;padding:0 4px;font-size:9px;font-weight:700;margin-right:4px}
.col-fk-badge{display:inline-block;background:#1a1a3a;border:1px solid #3a3a7a;color:#bc8cff;border-radius:3px;padding:0 4px;font-size:9px;font-weight:700;margin-right:4px}
.col-null-badge{display:inline-block;background:var(--bg3);border:1px solid var(--border2);color:var(--text3);border-radius:3px;padding:0 4px;font-size:9px;margin-right:4px}

/* ── Route table ── */
.route-row{display:grid;grid-template-columns:220px 160px 80px 1fr;gap:12px;padding:8px 12px;border-bottom:1px solid var(--border);align-items:center;font-size:12.5px}
.route-row:hover{background:var(--bg3)}
.route-path{font-family:var(--mono);color:var(--teal)}
.route-component{color:var(--navy3);cursor:pointer;font-weight:600}
.route-component:hover{color:var(--gold);text-decoration:underline}

/* ── Search Modal ── */
#search-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:flex-start;justify-content:center;padding-top:80px}
#search-modal.open{display:flex}
.search-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius2);width:600px;max-height:500px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.search-input-wrap{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border)}
.search-input-wrap svg{color:var(--text3);flex-shrink:0}
#search-input{flex:1;background:transparent;border:none;outline:none;font-size:15px;color:var(--text);font-family:var(--sans)}
#search-input::placeholder{color:var(--text3)}
#search-results{overflow-y:auto;max-height:380px}
.search-result{padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.search-result:hover,.search-result.focused{background:var(--bg3)}
.search-result-name{font-size:13px;font-weight:600;color:var(--text)}
.search-result-path{font-size:11px;color:var(--text3);margin-top:1px}
.search-result-type{font-size:10px;padding:2px 7px;border-radius:10px;flex-shrink:0}
.search-empty{padding:24px;text-align:center;color:var(--text3);font-size:13px}

/* ── Misc ── */
.divider{height:1px;background:var(--border);margin:20px 0}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:16px}
.info-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:14px}
.info-card-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.info-card-value{font-size:16px;font-weight:700;color:var(--text)}
.info-card-sub{font-size:11px;color:var(--text2);margin-top:2px}
code{font-family:var(--mono);font-size:12px;background:var(--bg3);padding:1px 5px;border-radius:3px;color:var(--orange)}
.inline-link{color:var(--navy3);cursor:pointer;font-weight:600}
.inline-link:hover{color:var(--gold);text-decoration:underline}
.section-tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:0}
.section-tab{padding:7px 14px;font-size:12.5px;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.section-tab:hover{color:var(--text2)}
.section-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-pane{display:none}
.tab-pane.active{display:block}
.flow-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;font-family:var(--mono);font-size:12px;color:var(--text2);line-height:1.8;white-space:pre;overflow-x:auto;margin-bottom:12px}
.flow-step{color:var(--text)}
.flow-arrow{color:var(--gold)}
.flow-detail{color:var(--text3)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* ── Arch diagram ── */
.arch-layer{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;align-items:center}
.arch-label{font-size:10px;color:var(--text3);width:80px;text-align:right;flex-shrink:0}
.arch-box{padding:5px 12px;border-radius:var(--radius);font-size:12px;font-weight:600;cursor:pointer}
.arch-box:hover{filter:brightness(1.2)}
.arch-arrow{color:var(--border2);font-size:20px;line-height:1;display:block;margin-left:80px;padding-left:8px;margin-bottom:4px}
.arch-react{background:#1e3a5f;color:#79c0ff;border:1px solid #2d5a8e}
.arch-context{background:#2d1a4a;color:#bc8cff;border:1px solid #4a2d7a}
.arch-service{background:#3a2200;color:#ffa657;border:1px solid #5a3a00}
.arch-db{background:#1a3320;color:#56d364;border:1px solid #2d5a45}
.arch-ext{background:#2a2a2a;color:#8899bb;border:1px solid #3a3a3a}
</style>
</head>
<body>
<div id="app">
  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">⬡ MERCANTA</div>
      <div class="sidebar-subtitle">Developer Knowledge Base · v3.0</div>
    </div>
    <div class="sidebar-search">
      <input type="text" placeholder="Filter navigation…" id="nav-filter" autocomplete="off">
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
  </aside>

  <!-- Main -->
  <div id="main">
    <div id="topbar">
      <div class="topbar-breadcrumb" id="breadcrumb">
        <span>Mercanta KB</span>
      </div>
      <button class="search-trigger" id="search-btn">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/></svg>
        Search everything…
        <kbd>⌘K</kbd>
      </button>
    </div>
    <div id="content"></div>
  </div>
</div>

<!-- Search Modal -->
<div id="search-modal">
  <div class="search-box">
    <div class="search-input-wrap">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/></svg>
      <input type="text" id="search-input" placeholder="Search components, tables, functions, routes…" autocomplete="off">
    </div>
    <div id="search-results"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════════════════════
const DATA = {

routes: [
  {path:'/',component:'RoleRedirect',role:'public',desc:'Root redirect — sends admin to /admin, franchise to /dashboard'},
  {path:'/login',component:'LoginPage',role:'public',desc:'Email/password login with animated gradient background'},
  {path:'/dashboard',component:'FranchiseDashboard',role:'franchise',desc:'Franchise KPI overview — sales, inventory, alerts'},
  {path:'/sales',component:'SalesPage',role:'franchise',desc:'POS — barcode/manual entry, cart, discounts, payment, receipts'},
  {path:'/inventory',component:'InventoryPage',role:'any',desc:'Inventory browser — search, filter, barcode printing'},
  {path:'/sales-history',component:'SalesHistoryPage',role:'any',desc:'Past sales with filtering, date range, export'},
  {path:'/customers',component:'CustomersPage',role:'any',desc:'Customer list with loyalty points and transaction history'},
  {path:'/forecast',component:'ForecastPage',role:'any',desc:'AI-powered sales forecast via Flask + Prophet'},
  {path:'/order-stock',component:'OrderStockPage',role:'franchise',desc:'Request stock from admin warehouse'},
  {path:'/menu',component:'RestaurantMenuPage',role:'any',desc:'Restaurant menu CRUD — categories, items, availability'},
  {path:'/kitchen',component:'KitchenDisplaySystem',role:'any',desc:'KDS — live order tokens, status workflow'},
  {path:'/tokens',component:'TokenTracker',role:'any',desc:'Token status tracker for restaurant orders'},
  {path:'/settings/restaurant',component:'RestaurantSettings',role:'any',desc:'Restaurant business account configuration'},
  {path:'/admin',component:'AdminDashboard',role:'admin',desc:'Admin overview — all franchises, aggregate metrics'},
  {path:'/admin/franchises',component:'ManageFranchisesPage',role:'admin',desc:'Create, edit, deactivate franchise accounts'},
  {path:'/admin/franchise/:id',component:'FranchiseDetailPage',role:'admin',desc:'Drill into one franchise — sales, inventory, orders'},
  {path:'/admin/reports',component:'FinancialReportsPage',role:'admin',desc:'Financial reports across all franchises'},
  {path:'/admin/inventory',component:'AdminInventoryPage',role:'admin',desc:'Warehouse inventory management'},
  {path:'/admin/stock-orders',component:'StockOrdersPage',role:'admin',desc:'Approve/reject stock requests from franchises'},
  {path:'/add-items',component:'AddItemsPage',role:'admin',desc:'Add items to admin warehouse (franchise_id = null)'},
  {path:'/analytics',component:'Dashboard',role:'admin',desc:'Legacy admin analytics view'},
],

pages: {
  LoginPage:{
    file:'src/pages/LoginPage.tsx',
    desc:'Login screen with Three.js liquid gradient background and custom animated cursor.',
    contexts:[],
    state:[
      {name:'email',type:'string',init:"''",desc:'Controlled input for email field'},
      {name:'password',type:'string',init:"''",desc:'Controlled input for password field'},
      {name:'showPassword',type:'boolean',init:'false',desc:'Toggle password visibility'},
      {name:'isSigningIn',type:'boolean',init:'false',desc:'Disables form during async login call'},
      {name:'cursorPos',type:'{x:number,y:number}',init:'{x:0,y:0}',desc:'Custom cursor position tracking'},
      {name:'isHovering',type:'boolean',init:'false',desc:'Controls custom cursor glow on hover'},
    ],
    effects:[
      {trigger:'mount',desc:'Attaches mousemove listener to track cursor position for custom cursor effect'},
      {trigger:'mount',desc:'Hides native cursor when over interactive elements'},
    ],
    functions:[
      {name:'handleLogin',params:'e: React.FormEvent',returns:'Promise<void>',desc:'Calls signIn(email, password). On error sets error state. On success AuthContext redirects.'},
    ],
    tables:[],
    components:['LiquidGradient','Ticker'],
    notes:'signIn comes from supabase.auth.signInWithPassword() wrapped in AuthContext.',
  },
  SalesPage:{
    file:'src/pages/SalesPage.tsx',
    desc:'Full-featured POS terminal. Supports barcode scanning, fuzzy search, item-level discounts, split payments, loyalty points, restaurant orders with KDS tokens.',
    contexts:['AuthContext','InventoryContext'],
    state:[
      {name:'entryMode',type:"'barcode'|'manual'",init:"'barcode'",desc:'How the user is adding items'},
      {name:'items',type:'SaleItem[]',init:'[]',desc:'Current cart contents'},
      {name:'selectedSku',type:'string',init:"''",desc:'Currently selected item SKU from dropdown'},
      {name:'searchQuery',type:'string',init:"''",desc:'Fuzzy search query for item lookup'},
      {name:'isDropdownOpen',type:'boolean',init:'false',desc:'Controls item search dropdown visibility'},
      {name:'quantity',type:'number',init:'1',desc:'Quantity for currently-being-added item'},
      {name:'price',type:'number',init:'0',desc:'Price override for current item'},
      {name:'barcode',type:'string',init:"''",desc:'Barcode input value'},
      {name:'customerName',type:'string',init:"''",desc:'Customer name for this sale'},
      {name:'customerPhone',type:'string',init:"''",desc:'Customer phone — used to look up loyalty points'},
      {name:'customerEmail',type:'string',init:"''",desc:'Optional customer email'},
      {name:'isLookingUpCustomer',type:'boolean',init:'false',desc:'Loading state during phone lookup'},
      {name:'customerPointsBalance',type:'number',init:'0',desc:'Points available to redeem'},
      {name:'pointsToUse',type:'number',init:'0',desc:'Points the customer is applying to this sale'},
      {name:'isRestaurantOrder',type:'boolean',init:'false',desc:'True when business is a restaurant — enables KDS token'},
      {name:'specialInstructions',type:'string',init:"''",desc:'Kitchen notes for restaurant orders'},
      {name:'paymentMethod',type:"'cash'|'upi'|'card'|'split'",init:"'cash'",desc:'Payment method for this sale'},
      {name:'paymentDetails',type:'Record<string,number>',init:'{}',desc:'Split payment breakdown e.g. {cash:200,upi:150}'},
      {name:'cartDiscountType',type:"'percent'|'flat'",init:"'percent'",desc:'Type of cart-level discount'},
      {name:'cartDiscountValue',type:'number',init:'0',desc:'Amount of cart-level discount'},
      {name:'taxRate',type:'number',init:'0',desc:'Tax percentage applied to sale total'},
      {name:'hasHeldSale',type:'boolean',init:'false',desc:'Whether there is a paused/held sale in sessionStorage'},
      {name:'isScanning',type:'boolean',init:'false',desc:'Camera scanner open/closed'},
      {name:'menuItems',type:'MenuItem[]',init:'[]',desc:'Restaurant menu items (only loaded when isRestaurantOrder)'},

      {name:'getBusinessAccounts',params:'',returns:'Promise<BusinessAccount[]>',desc:'Fetches accounts via get_user_business_accounts RPC, which joins permissions.'},
      {name:'createBusinessAccount',params:'businessName: string, businessType: string',returns:'Promise<{error, account?}>',desc:'Creates a new business_accounts row owned by current user.'},
    ],

2. If session found: setUser(), fetchProfile(userId)
3. fetchProfile() → SELECT * FROM profiles WHERE id = userId
4. If franchise role: fetchFranchise(userId)
5. fetchBusinessAccounts(userId) via RPC get_user_business_accounts
6. getActiveBusinessAccountFromSession() → checks active_account_sessions
7. supabase.auth.onAuthStateChange() — subscribes to SIGNED_IN / SIGNED_OUT events
8. On SIGNED_OUT: clears all state variables`,

      {name:'recordSale',params:'items: SaleItem[], customerInfo, payment',returns:'Promise<{success, saleId?, tokenNumber?}>',desc:'Main sale transaction: INSERT sale → INSERT sale_items → UPDATE inventory quantities → upsert customer → award points → createOrderToken if restaurant.'},
      {name:'addCustomer',params:'customer: Omit<Customer,"id"|"createdAt">',returns:'Promise<Customer|null>',desc:'INSERTs new customer row.'},
      {name:'getTotalInventoryValue',params:'',returns:'number',desc:'Sync: sum of price × quantity across inventory[].'},

      {name:'getLowStockItems',params:'threshold?: number = 20',returns:'InventoryItem[]',desc:'Sync: filters inventory where quantity < threshold.'},
      {name:'refreshData',params:'',returns:'Promise<void>',desc:'Re-fetches inventory, sales, customers, stockOrders.'},
      {name:'createStockOrder',params:'order: StockOrderRequest',returns:'Promise<boolean>',desc:'Franchise creates a stock request. INSERTs stock_orders + stock_order_items.'},

// RENDER HELPERS
// ══════════════════════════════════════════════════════════════════
function tag(label, cls, onclick) {
  return `<span class="tag ${cls}" onclick="${onclick || ''}">${label}</span>`;
}
function componentTag(name) {
  const id = 'page_'+name in DATA.pages ? 'page_'+name : 'comp_'+name;
  return tag(name,'tag-component',`navigate('${id}')`);
}
function tableTag(name) {
  return tag(name,'tag-table',`navigate('db_${name}')`);
}
function contextTag(name) {
  const key = name.replace('Context','');
  return tag(name,'tag-context',`navigate('ctx_${key}Context')`);
}
function serviceTag(name) {
  return tag(name,'tag-service',`navigate('svc_${name}')`);
}
function roleBadge(role) {
  if(role==='admin') return tag('Admin only','tag-admin','');
  if(role==='franchise') return tag('Franchise only','tag-franchise','');
  if(role==='public') return tag('Public','tag-public','');
  return tag('Any role','tag-optional','');
}
function stateItem(s) {
  return `<div class="state-item">
    <div><span class="state-name">${s.name}</span> <span class="state-type">${s.type}</span> <span class="state-default">= ${s.init||'—'}</span></div>
    <div class="state-desc">${s.desc}</div>
  </div>`;
}
function fnItem(f) {
  const tags = (f.tables||[]).map(t=>tableTag(t)).join(' ') + (f.contexts||[]).map(c=>contextTag(c)).join(' ');
  return `<div class="fn-item">
    <div class="fn-sig"><span class="fn-name">${f.name}</span>(<span class="fn-param">${f.params||''}</span>): <span class="fn-return">${f.returns||'void'}</span></div>
    <div class="fn-desc">${f.desc}</div>
    ${tags?`<div class="fn-tags">${tags}</div>`:''}
  </div>`;
}
function colRow(c) {
  let nameCls = 'col-name';
  let badges = '';
  if(c.pk) { nameCls+=' pk'; badges+=`<span class="col-pk-badge">PK</span>`; }
  if(c.fk) { nameCls+=' fk'; badges+=`<span class="col-fk-badge">FK → ${c.fk}</span>`; }
  return `<div class="col-row">
    <div class="${nameCls}">${c.name}</div>
    <div class="col-type">${c.type}</div>
    <div class="col-notes">${badges}${c.notes||''}</div>
  </div>`;
}

// ══════════════════════════════════════════════════════════════════
// ROUTER
// ══════════════════════════════════════════════════════════════════
let currentPage = 'overview';

function navigate(id) {
  currentPage = id;
  renderContent();
  updateNav();
  document.getElementById('content').scrollTop = 0;
  // Auto-expand parent section if needed
  const section = NAV.find(s=>s.children&&s.children.some(c=>c.id===id));
  if(section) {
    const el = document.getElementById('section_'+section.id);
    if(el) {
      el.style.display = 'block';
      const arrow = document.getElementById('arrow_'+section.id);
      if(arrow) arrow.classList.add('open');
    }
  }
}

function renderContent() {
  const el = document.getElementById('content');
  if(currentPage === 'overview') el.innerHTML = RENDERERS.overview();
  else if(currentPage === 'architecture') el.innerHTML = RENDERERS.architecture();
  else if(currentPage === 'routes') el.innerHTML = RENDERERS.routes();
  else if(currentPage === 'features') el.innerHTML = RENDERERS.features();
  else if(currentPage === 'env') el.innerHTML = RENDERERS.env();
  else if(currentPage.startsWith('page_')) el.innerHTML = RENDERERS.page(currentPage.slice(5));
  else if(currentPage.startsWith('comp_')) el.innerHTML = RENDERERS.component(currentPage.slice(5));
  else if(currentPage.startsWith('ctx_')) el.innerHTML = RENDERERS.context(currentPage.slice(4));
  else if(currentPage.startsWith('db_')) el.innerHTML = RENDERERS.db(currentPage.slice(3));
  else if(currentPage.startsWith('svc_')) el.innerHTML = RENDERERS.service(currentPage.slice(4));
  else el.innerHTML = RENDERERS.overview();
  // Update breadcrumb
  updateBreadcrumb();
}

function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  let parts = ['Mercanta KB'];
  if(currentPage.startsWith('page_')) parts.push('Pages', currentPage.slice(5));
  else if(currentPage.startsWith('comp_')) parts.push('Components', currentPage.slice(5));
  else if(currentPage.startsWith('ctx_')) parts.push('Contexts', currentPage.slice(4));
  else if(currentPage.startsWith('db_')) parts.push('Database', currentPage.slice(3));
  else if(currentPage.startsWith('svc_')) parts.push('Services', currentPage.slice(4));
  else parts.push(currentPage.charAt(0).toUpperCase()+currentPage.slice(1));
  bc.innerHTML = parts.map((p,i)=>i===parts.length-1?`<span>${p}</span>`:`<span style="cursor:pointer;color:var(--text3)" onclick="navigate('${i===0?'overview':currentPage}')">${p}</span><span class="sep">›</span>`).join('');
}

function updateNav() {
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.id === currentPage);
  });
}

// ══════════════════════════════════════════════════════════════════
// SIDEBAR BUILD
// ══════════════════════════════════════════════════════════════════
function buildSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = NAV.map(section => {
    const hasChildren = section.children && section.children.length > 0;
    const badge = section.badge ? `<span class="nav-badge">${section.badge}</span>` : '';
    if(!hasChildren) {
      return `<div class="nav-section">
        <div class="nav-item${currentPage===section.id?' active':''}" data-id="${section.id}" onclick="navigate('${section.id}')">
          <span class="nav-icon">${section.icon}</span>${section.label}${badge}
        </div>
      </div>`;
    }
    const isOpen = section.children.some(c=>c.id===currentPage);
    const items = section.children.map(c=>`
      <div class="nav-item${currentPage===c.id?' active':''}" data-id="${c.id}" onclick="navigate('${c.id}')">
        <span class="nav-icon">${c.icon}</span>${c.label}
      </div>`).join('');
    return `<div class="nav-section">
      <div class="nav-section-header" onclick="toggleSection('${section.id}')">
        <span><span style="margin-right:6px">${section.icon}</span>${section.label}${badge}</span>
        <span class="nav-arrow${isOpen?' open':''}" id="arrow_${section.id}">▶</span>
      </div>
      <div class="nav-items" id="section_${section.id}" style="display:${isOpen?'block':'none'}">${items}</div>
    </div>`;
  }).join('');
}

function toggleSection(id) {
  const el = document.getElementById('section_'+id);
  const arrow = document.getElementById('arrow_'+id);
  if(!el) return;
  const isOpen = el.style.display !== 'none';
  el.style.display = isOpen ? 'none' : 'block';
  if(arrow) arrow.classList.toggle('open', !isOpen);
}

function buildSearchIndex() {
  const idx = [];
  DATA.routes.forEach(r=>{
    idx.push({id:'page_'+r.component,name:r.component,path:r.path,type:'Route',color:'tag-route'});
  });
  Object.entries(DATA.pages).forEach(([k,v])=>{
    idx.push({id:'page_'+k,name:k,path:v.file,type:'Page',color:'tag-component'});
    (v.state||[]).forEach(s=>idx.push({id:'page_'+k,name:s.name+' (state)',path:k+' → '+v.file,type:'State',color:'tag-optional'}));
    (v.functions||[]).forEach(f=>idx.push({id:'page_'+k,name:f.name+'()',path:k,type:'Function',color:'tag-service'}));
  });
  Object.entries(DATA.components).forEach(([k,v])=>{
    idx.push({id:'comp_'+k,name:k,path:v.file,type:'Component',color:'tag-component'});
  });
  Object.entries(DATA.contexts).forEach(([k,v])=>{
    idx.push({id:'ctx_'+k,name:k,path:v.file,type:'Context',color:'tag-context'});
    v.state.forEach(s=>idx.push({id:'ctx_'+k,name:s.name+' (context state)',path:k,type:'State',color:'tag-optional'}));
    v.functions.forEach(f=>idx.push({id:'ctx_'+k,name:f.name+'()',path:k,type:'Function',color:'tag-service'}));
  });
  Object.entries(DATA.database).forEach(([k,v])=>{
    idx.push({id:'db_'+k,name:k,path:'Database table',type:'Table',color:'tag-table'});
    v.cols.forEach(c=>idx.push({id:'db_'+k,name:c.name+' (column)',path:k,type:'Column',color:'tag-optional'}));
  });
  Object.entries(DATA.services).forEach(([k,v])=>{
    idx.push({id:'svc_'+k,name:k,path:v.file,type:'Service',color:'tag-service'});
    v.functions.forEach(f=>idx.push({id:'svc_'+k,name:f.name+'()',path:k,type:'Function',color:'tag-service'}));
  });
  DATA.features.forEach((f,i)=>{
    idx.push({id:'features',name:f.name,path:'Features',type:'Feature',color:'tag-public'});
  });
  return idx;
}

const searchIndex = buildSearchIndex();
let searchFocused = 0;

function openSearch() {
  document.getElementById('search-modal').classList.add('open');
  setTimeout(()=>document.getElementById('search-input').focus(),50);
}
function closeSearch() {
  document.getElementById('search-modal').classList.remove('open');
  document.getElementById('search-input').value = '';
  document.getElementById('search-results').innerHTML = '';
}

document.getElementById('search-btn').onclick = openSearch;
document.getElementById('search-modal').onclick = function(e) {
  if(e.target === this) closeSearch();
};

document.getElementById('search-input').oninput = function() {
  const q = this.value.toLowerCase().trim();
  const results = document.getElementById('search-results');
  if(!q) { results.innerHTML = ''; return; }
  const matches = searchIndex.filter(item=>
    item.name.toLowerCase().includes(q) || item.path.toLowerCase().includes(q) || item.type.toLowerCase().includes(q)
  ).slice(0,15);
  if(!matches.length) { results.innerHTML = '<div class="search-empty">No results found</div>'; return; }
  searchFocused = 0;
  results.innerHTML = matches.map((m,i)=>`
    <div class="search-result${i===0?' focused':''}" onclick="navigate('${m.id}');closeSearch()" data-idx="${i}">
      <span class="tag ${m.color}" style="flex-shrink:0">${m.type}</span>
      <div><div class="search-result-name">${m.name}</div><div class="search-result-path">${m.path}</div></div>
    </div>`).join('');
  // Store for keyboard nav
  results._matches = matches;
};

document.getElementById('search-input').onkeydown = function(e) {
  const results = document.getElementById('search-results');
  const items = results.querySelectorAll('.search-result');
  if(e.key==='ArrowDown') { e.preventDefault(); searchFocused=Math.min(searchFocused+1,items.length-1); items.forEach((el,i)=>el.classList.toggle('focused',i===searchFocused)); }
  else if(e.key==='ArrowUp') { e.preventDefault(); searchFocused=Math.max(searchFocused-1,0); items.forEach((el,i)=>el.classList.toggle('focused',i===searchFocused)); }
  else if(e.key==='Enter') { const m=results._matches&&results._matches[searchFocused]; if(m){navigate(m.id);closeSearch();} }
  else if(e.key==='Escape') closeSearch();
};

// Nav filter
document.getElementById('nav-filter').oninput = function() {
  const q = this.value.toLowerCase();
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.style.display = !q||el.textContent.toLowerCase().includes(q)?'':'none';
  });
  if(q) {
    document.querySelectorAll('.nav-items').forEach(el=>el.style.display='block');
    document.querySelectorAll('.nav-arrow').forEach(el=>el.classList.add('open'));
  }
};

// Global keyboard shortcut
document.addEventListener('keydown', function(e) {
  if((e.metaKey||e.ctrlKey) && e.key==='k') { e.preventDefault(); openSearch(); }
  if(e.key==='Escape' && document.getElementById('search-modal').classList.contains('open')) closeSearch();
});

// ══════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════
buildSidebar();
renderContent();

// Handle hash navigation (for direct links)
if(location.hash && location.hash.startsWith('#/')) {
  const id = location.hash.slice(2);
  if(id) navigate(id);
}
</script>
</body>
</html>
